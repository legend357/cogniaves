<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CogniAves</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="logo">
          <div class="logo-icon">
            <svg width="18" height="18" viewBox="0 0 32 32" fill="none">
              <circle cx="16" cy="14" r="7" stroke="white" stroke-width="1.8" fill="none"/>
              <path d="M13 14h2m4 0h-2m-2 0V12" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M13 21v2a1 1 0 001 1h4a1 1 0 001-1v-2" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </div>
          <span class="logo-text">CogniAves</span>
        </div>
        <button class="icon-btn" onclick="toggleSidebar()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>

      <!-- Live Clock -->
      <div class="clock-widget">
        <div class="clock-time" id="clock-time">00:00:00</div>
        <div class="clock-date" id="clock-date">Loading...</div>
      </div>

      <button class="new-chat-btn" onclick="newChat()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        New chat
      </button>

      <div class="section-label">Assistant mode</div>
      <div class="mode-list">
        <div class="mode-item active" data-mode="general"  onclick="setMode('general')">🌐 General</div>
        <div class="mode-item" data-mode="coding"   onclick="setMode('coding')">💻 Coding</div>
        <div class="mode-item" data-mode="math"     onclick="setMode('math')">📐 Math</div>
        <div class="mode-item" data-mode="science"  onclick="setMode('science')">🔬 Science</div>
        <div class="mode-item" data-mode="writing"  onclick="setMode('writing')">✍️ Writing</div>
        <div class="mode-item" data-mode="language" onclick="setMode('language')">🌍 Language</div>
        <div class="mode-item" data-mode="history"  onclick="setMode('history')">📜 History</div>
        <div class="mode-item" data-mode="news"     onclick="setMode('news')">🗞️ Current Affairs</div>
      </div>

      <div class="section-label">Chat history</div>
      <div class="chat-history" id="chat-history">
        <div class="history-empty">No chats yet</div>
      </div>

      <div class="sidebar-bottom">
        <div class="user-info">
          <div class="user-avatar" id="user-avatar">U</div>
          <span class="user-name" id="user-name">User</span>
          <button class="icon-btn" onclick="logout()" title="Logout">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <button class="icon-btn" onclick="toggleSidebar()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <div class="mode-badge" id="mode-badge">🌐 General Assistant</div>
        <button class="icon-btn theme-btn" onclick="toggleTheme()" title="Toggle dark mode">
          <svg class="sun-icon" width="17" height="17" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <svg class="moon-icon" width="17" height="17" viewBox="0 0 24 24" fill="none" style="display:none"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>

      <div class="messages" id="messages"></div>

      <div class="input-area">
        <div class="input-box">
          <textarea id="user-input" placeholder="Ask CogniAves anything..." rows="1"></textarea>
          <button class="send-btn" id="send-btn" onclick="sendMessage()">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
        <p class="disclaimer">CogniAves may make mistakes. Always verify important information.</p>
      </div>
    </main>
  </div>

  <script src="/js/highlight.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
